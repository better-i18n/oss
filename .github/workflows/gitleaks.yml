name: gitleaks

# Runs on every PR + push to main. Secret-scanning gate for public OSS repo.
#
# Uses self-hosted gitleaks binary (MIT, free) — no paid license required.
# Scans only the commits introduced by the push/PR (not the full history).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (PR)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json \
            --log-opts "${BASE_SHA}..${HEAD_SHA}" \
            --verbose

      - name: Run gitleaks (push)
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json \
            --log-opts "${BEFORE_SHA}..${AFTER_SHA}" \
            --verbose

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LEAKS=$(cat gitleaks-report.json | jq length)
          gh pr comment "${PR_NUMBER}" \
            --body "**Gitleaks:** ${LEAKS} secret(s) detected. Check the [workflow run](${RUN_URL}) and uploaded artifact for details."
