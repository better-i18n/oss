name: Deploy Landing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/core/**"
      - "packages/use-intl/**"
      - "packages/schemas/**"
      - "bun.lock"

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://better-i18n.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build & Deploy
        working-directory: apps/landing
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_I18N_CONTENT_API_KEY: ${{ secrets.BETTER_I18N_CONTENT_API_KEY }}
          BETTER_I18N_PROJECT: ${{ secrets.BETTER_I18N_PROJECT }}
